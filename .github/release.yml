# Configuration for GitHub automatically generated release notes.
# pendpost promotes one way: develop -> staging -> main. Releases are tagged
# on main, and these notes are generated from the merged pull requests.
changelog:
  exclude:
    labels:
      - skip-changelog
      - chore
  categories:
    - title: New features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
