name: release npm

# Publish pendpost to npm when a GitHub Release is published (owner action), or on
# a manual dispatch. This never runs on a normal push, so npm publish stays an
# explicit, owner-gated step. `prepack` (npm run build) bakes app/dist into the
# tarball, and the `files` allowlist keeps it to the shipped product.
#
# Prerequisites (owner): the repo is public, and an npm granular/automation token
# is stored as the NPM_TOKEN secret. Provenance needs `id-token: write` and a
# public repo; it attaches a verifiable build attestation to the package.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # GitHub-hosted (free + unlimited on this PUBLIC repo). Hosted runners are
    # required for npm --provenance, which attaches a verifiable build attestation
    # via OIDC (needs the `id-token: write` permission above + a public repo).
    runs-on: ubuntu-latest
    if: github.repository == 'pendpost/pendpost'
    steps:
      # Fail fast (and clearly) if the publish credential is missing. Without this,
      # a missing/empty NPM_TOKEN only surfaces ~36s later as a cryptic `npm error
      # code ENEEDAUTH` after the whole app has already been built and packed. An
      # empty value here always means the secret is not set on the repo (an invalid
      # token would instead reach the registry and return E401), so the message
      # points straight at the fix.
      - name: Verify NPM_TOKEN is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set. Add an npm automation/granular token as the repository secret NPM_TOKEN (Settings -> Secrets and variables -> Actions). If it is stored as an Environment secret, add the matching \`environment:\` key to this job so the secret is in scope." >&2
            exit 1
          fi
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      # Full gate before we publish: syntax, parity, and the zero-dep test suite
      # (this is what CI runs; supply-chain.test.mjs asserts the version files match).
      - run: npm run check
      - name: Verify the release tag matches package.json
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Release tag ($tag) does not match package.json version ($pkg)." >&2
            exit 1
          fi
      # --provenance attaches a verifiable build attestation (the repo is public and
      # `id-token: write` is granted above). It links the published tarball to this
      # exact workflow run + commit.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
