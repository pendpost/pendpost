name: IndexNow

# Ping IndexNow (Bing, Yandex, and others) after the marketing site changes on
# main, so they re-crawl quickly. Bing index coverage is the gate for
# ChatGPT-Search citations. Vercel deploys main in parallel; IndexNow re-crawl is
# asynchronous, so exact timing does not matter.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    # site-only: pings search engines about the marketing site; web/ is private,
    # so this never applies to the public OSS repo.
    if: github.repository == 'pendpost/site'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: node scripts/indexnow-ping.mjs
        working-directory: web
