name: release image

# Build the container image and push it to GHCR when a GitHub Release is published
# (owner action), or on a manual dispatch. This gives a no-clone install:
#   docker run -p 8090:8090 ghcr.io/pendpost/pendpost
# It reuses the repo Dockerfile (multi-stage: build the dashboard, run the
# zero-dependency server, bind 0.0.0.0 inside the container only). Tags: the
# release version and `latest`.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    if: github.repository == 'pendpost/pendpost'
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # On a release: a semver tag (1.0.0, 1.0, 1) plus `latest`. On dispatch:
          # the branch/sha tag. `latest` only moves on a published release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=branch
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
