# strfry.conf - pendpost sandbox relay (loopback-only, disposable).
# nofiles = 0 skips the NOFILES rlimit raise (strfry's 1M default exceeds the
# colima VM's 524288 hard cap and aborts the process).

db = "./strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 0

    info {
        name = "pendpost sandbox relay"
        description = "local publish-lane verification relay - disposable"
    }
}
